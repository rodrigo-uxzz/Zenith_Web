<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/criarScreen2.css">
    <title>Criar conta</title>
    <link rel="icon" type="image/x-icon" href="./img/logo z.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main> <!-- main: 1 -->
        
        <section> <!-- section: 2 -->
            
            <!-- logo e nome do site -->
            <article>
                <figure>
                    <img src="./img/logo.png" alt="Logo Zenith">
                </figure>
                <p>Cadastro de Psicólogo</p>
            </article>

            <!-- botões e etc abaixo em section-->
               <form action="#" method="post">

                   <div class="linha1"> 
                       <div class="input-container">
                           <img src="./img/user.svg" alt="icone" class="icon-input">
                           <label for="crp" class="label-diferenciado">CRP (Registro Profissional):</label>
                           <input type="text" class="input-diferenciado" id="crp" name="crp" required placeholder="00/00000">
                       </div>
                   </div>
                   
                   <!-- ----separador---- -->

                   <div class="linha2">

                       <div class="input-container">
                           <p class="pergunta-radio">Possui cadastro no e-psi?</p>
                           <div class="radio-group">
                               <label class="radio-label">
                                   <input type="radio" id="epsi-nao" name="cadastroEpsi" value="nao" required>
                                   <span>Não</span>
                               </label>
                               <label class="radio-label">
                                   <input type="radio" id="epsi-sim" name="cadastroEpsi" value="sim" required>
                                   <span>Sim</span>
                               </label>
                           </div>
                       </div>
                       
                       <div class="input-container">
                           <img src="./img/telefone.svg" alt="icone" class="icon-input">
                           <label for="formacao" class="label-diferenciado">Qual seu grau de formação?</label>
                           <select class="input-diferenciado" id="formacao" name="formacao" required>
                               <option value="">Selecione uma opção</option>
                               <option value="graduado">Graduado</option>
                               <option value="especialista">Especialista</option>
                               <option value="mestre">Mestre</option>
                               <option value="doutor">Doutor</option>
                           </select>
                       </div>
                    </div>


                   <!-- ----separador---- -->

                   <div class="input-container">
                       <img src="./img/email.svg" alt="icone" class="icon-input">
                       <label for="email" class="label-diferenciado">Email:</label>
                       <input type="email" class="input-diferenciado" id="email" name="email" required placeholder="seu@email.com">
                   </div>

                   <!-- ----separador---- -->

                   <div class="linha3">
                       <div class="input-container">
                           <img src="./img/lock.svg" alt="icone" class="icon-input">
                           <label for="senha" class="label-diferenciado">Senha:</label>
                           <input type="password" class="input-diferenciado" id="senha" name="senha" required placeholder="Digite sua senha">
                       </div>
                       
                       <div class="input-container">
                           <img src="./img/lock.svg" alt="icone" class="icon-input">
                           <label for="confirmarSenha" class="label-diferenciado">Confirmar Senha:</label>
                           <input type="password" class="input-diferenciado" id="confirmarSenha" name="confirmarSenha" required placeholder="Confirme sua senha">
                       </div>
                   </div>

                   <!-- ----separador---- -->
                   <div class="containerT">
                      <label for="termos" class="termos">
                          <input type="checkbox" id="termos" name="termos" required>
                          <span>Concordo com os</span> <a href="#" class="link-termos">Termos de Uso</a> <span>e</span> <a href="#" class="link-termos">Política de Privacidade</a>.
                        </label>
                    </div>
                    
                    <div class="botoes-footer">
                        <button type="button" class="botaoC botao-anterior" onclick="voltarTela1()">← Anterior</button>
                        <button type="button" class="botaoC" onclick="criarConta()">Criar conta</button>
                    </div>
                </form>
                
            </section>
        
        </main>
        <p class="mds">&copy; 2026 Zenith. Todos os direitos reservados.</p>

        <!-- Modal -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <p id="modal-message"></p>
            </div>
        </div>

        <script>
            // Função para mostrar modal
            function showModal(message) {
                document.getElementById('modal-message').textContent = message;
                document.getElementById('modal').style.display = 'block';
            }

            // Fechar modal
            document.querySelector('.close').onclick = function() {
                document.getElementById('modal').style.display = 'none';
            }

            window.onclick = function(event) {
                if (event.target == document.getElementById('modal')) {
                    document.getElementById('modal').style.display = 'none';
                }
            }

            // Quando a página abre, valida se tem dados salvos
            window.addEventListener("DOMContentLoaded", function() {
                let nome = localStorage.getItem("nome");
                
                // Se não encontrou, volta pra tela 1
                if (nome === null) {
                    showModal("⚠️ Você precisa preencher a tela anterior!");
                    setTimeout(() => {
                        window.location.href = "./criarScreen.html";
                    }, 2000);
                }
            });

            // Função pra voltar pra tela 1
            function voltarTela1() {
                window.location.href = "./criarScreen.html";
            }

            // Função pra criar conta
            function criarConta() {
                // Pegando os valores dos campos da tela 2
                let email = document.getElementById("email").value;
                let senha = document.getElementById("senha").value;
                let confirmarSenha = document.getElementById("confirmarSenha").value;
                let cadastroEpsi = document.querySelector('input[name="cadastroEpsi"]:checked');
                let formacao = document.getElementById("formacao").value;
                let termos = document.getElementById("termos").checked;

                // Validando se estão vazios
                if (email === "" || senha === "" || confirmarSenha === "" || !cadastroEpsi || formacao === "" || !termos) {
                    showModal("❌ ERRO: Preencha TODOS os campos e aceite os termos!");
                    return;
                }

                // Validando se as senhas são iguais
                if (senha !== confirmarSenha) {
                    showModal("❌ ERRO: As senhas não conferem!");
                    return;
                }

                // Pegando dados da tela 1 (que já foram salvos)
                let nome = localStorage.getItem("nome");
                let telefone = localStorage.getItem("telefone");
                let data = localStorage.getItem("data");
                let genero = localStorage.getItem("genero");
                let cpf = localStorage.getItem("cpf");
                let crp = localStorage.getItem("crp");

                // Salvando dados da tela 2 também
                localStorage.setItem("email", email);
                localStorage.setItem("senha", senha);
                localStorage.setItem("cadastroEpsi", cadastroEpsi.value);
                localStorage.setItem("formacao", formacao);

                // Mostrando um resumo de todos os dados
                let resumo = `
✅ CONTA CRIADA COM SUCESSO!

📋 DADOS PESSOAIS:
• Nome: ${nome}
• Telefone: ${telefone}
• Data Nascimento: ${data}
• Gênero: ${genero}

📄 DOCUMENTOS:
• CPF: ${cpf}
• CRP: ${crp}

💼 DADOS PROFISSIONAIS:
• Email: ${email}
• E-psi: ${cadastroEpsi.value}
• Formação: ${formacao}
                `;

                showModal(resumo);
                
                // Ir pra home
                setTimeout(() => {
                    window.location.href = "./homeScreen.html";
                }, 5000); // Mais tempo para o resumo
            }
        </script>
</body>
</html>
