<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar conta</title>

    <link rel="icon" type="image/x-icon" href="../img/logo z.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/criarScreen.css">
</head>

<body>

<div class="split-container">

    <!-- LADO ESQUERDO -->
    <div class="left-side">
        <div class="left-content">
            <img src="../img/logo.png" alt="Logo Zenith">
            <h1>Zenith</h1>
            <p>Cadastre-se e comece a gerenciar seus atendimentos.</p>
        </div>
    </div>

    <!-- LADO DIREITO -->
    <div class="right-side">

        <main>
            <section>

                <article>
                    <p>Cadastro de Psicólogo</p>

                    <div class="profile-upload">
                        <div class="upload-container" id="uploadContainer">
                            <img id="preview" style="display: none;" />
                            <div class="placeholder" id="placeholder">
                                <ion-icon name="person-outline"></ion-icon>
                            </div>
                        </div>

                        <button type="button" class="upload-btn" onclick="document.getElementById('fileInput').click()">
                            <ion-icon name="camera-outline"></ion-icon> Adicionar Foto
                        </button>

                        <input type="file" id="fileInput" accept="image/png, image/jpeg, image/gif" hidden />

                        <p class="info">
                            JPG, PNG ou GIF • máx 5MB
                        </p>
                    </div>
                </article>

                <form action="#" method="post">

                    <div class="grid">

                        <div class="input-container">
                            <img src="../img/user.svg" class="icon-input">
                            <label>Nome Completo</label>
                            <input type="text" id="fullName" required placeholder="Seu nome completo">
                        </div>

                        <div class="input-container">
                            <img src="../img/telefone.svg" class="icon-input">
                            <label>Telefone</label>
                            <input type="text" id="telefone" required placeholder="(00) 00000-0000">
                        </div>

                        <div class="input-container">
                            <img src="../img/calendar.png" class="icon-input">
                            <label>Data Nascimento</label>
                            <input type="date" id="dataNascimento" required placeholder="dd/mm/aaaa">
                        </div>

                        <div class="input-container">
                            <img src="../img/arrow.png" class="icon-input">
                            <label>Gênero</label>
                            <select id="genero" required>
                                <option value="">Selecione</option>
                                <option>Masculino</option>
                                <option>Feminino</option>
                                <option>Outro</option>
                                <option>Prefiro não informar</option>
                            </select>
                        </div>

                        <div class="input-container">
                            <img src="../img/lock.svg" class="icon-input">
                            <label>CPF</label>
                            <input type="text" id="cpf" required placeholder="000.000.000-00">
                        </div>

                        <div class="input-container">
                            <img src="../img/user.svg" class="icon-input">
                            <label>CRP</label>
                            <input type="text" id="crp" required placeholder="XX/XXXXX">
                        </div>

                    </div>

                    <button type="button" class="botaoC" id="proximaTela">Próximo ➔</button>

                    <div class="façaContainer">
                        <p>Já possui conta?</p>
                        <a href="./loginScreen.html" class="faça-login">Faça login</a>
                    </div>

                </form>

            </section>
        </main>

        <footer class="footer-right">
            &copy; 2026 Zenith. Todos os direitos reservados.
        </footer>

    </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
    <div class="modal-content">
        <p id="modal-message"></p>
    </div>
</div>

<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script type="module" src="../js/cadastrar1.js"></script>

</body>
</html>
