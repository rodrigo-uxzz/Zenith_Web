<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/loginScreen.css">
    <title>Zenith</title>
    <link rel="icon" type="image/x-icon" href="../img/logo z.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
   
    <main> <!-- main: 1 -->

        <section> <!-- section: 2 -->
            
            <!-- logo e nome do site -->
            <article>
                <figure>
                    <img src="../img/logo.png" alt="Logo Zenith">
                </figure>
                <p>Utilize seu e-mail ou CRP e sua senha cadastrada para entrar </p>
            </article>

        <!-- botões e etc abaixo em section-->
            <form id="loginForm" action="#" method="post">
                <div class="input-container">
                <label for="email">E-mail ou CRP:</label>
                    <input type="text" id="email" name="email" placeholder="Seu@gmail.com" required>
                </div>

                <div class="input-container">
                <label for="password">Senha:</label>
                    <input type="password" id="password" name="password" placeholder="******" required>
                </div>
                
                <button type="submit" class="botaoE">Entrar</button>
                <a href="./criarScreen.html" class="botaoC" type="submit">Criar conta</a>
                <a href="#" class="esqueci">Esqueci minha senha</a>
            </form>

        </section>

    </main>
        <p class="mds">&copy; 2026 Zenith. Todos os direitos reservados.</p>
    
    <script type="module" src="../js/login.js"></script>

            <!-- Modal -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <p id="modal-message"></p>
            </div>
        </div>
    
    <!-- Toast de Alerta -->
    <div id="toast" class="toast">
        <span id="toast-message"></span>
    </div>

</body>
</html>
