<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessões</title>

    <link rel="stylesheet" href="../css/sessoes.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <script>
      const token = localStorage.getItem("token");

      if(!token){
        window.location.href = "loginScreen.html";
      }
    </script>
</head>

<body>

    <div class="sidebar">
        <ul>
            <li>
                <a href="#">
                    <span class="icone"><img src="../img/logo.png" class="logo" alt="logo do site"></span>
                    <span class="titulo">ZENITH</span>
                </a>
            </li>
            <li>
                <a href="./homeScreen.html">
                    <span class="icone"><ion-icon name="home-outline"></ion-icon></span>
                    <span class="titulo">Home</span>
                </a>
            </li>
            <li>
                <a href="./agendaScreen.html">
                    <span class="icone"><ion-icon name="calendar-outline"></ion-icon></span>
                    <span class="titulo">Agenda</span>
                </a>
            </li>
            <li>
                <a href="#">
                    <span class="icone"><ion-icon name="people-outline"></ion-icon></span>
                    <span class="titulo">Pacientes</span>
                </a>
            </li>
            <li>
                <a href="#">
                    <span class="icone"><ion-icon name="wallet-outline"></ion-icon></span>
                    <span class="titulo">Financeiro</span>
                </a>
            </li>
            <li>
                <a href="#">
                    <span class="icone"><ion-icon name="chatbubbles-outline"></ion-icon></span>
                    <span class="titulo">Chat</span>
                </a>
            </li>
            <li>
                <a href="#">
                    <span class="icone"><ion-icon name="settings-outline"></ion-icon></span>
                    <span class="titulo">Configurações</span>
                </a>
            </li>
            <li>
                <a href="./perfilScreen.html">
                    <span class="icone"><ion-icon name="person-outline"></ion-icon></span>
                    <span class="titulo">Perfil</span>
                </a>
            </li>
            <li class="conta">
                <!--<a href="#">
                    <span class="icone">
                        <div class="imgCaixa">
                             <img src="img/user.svg"> 
                             A parte q o Roberto já fez
                        </div>
                    </span>
                    <span class="titulo">Moana Dark</span>
                </a>-->
            </li>
            <li>
                <a href="#" id="open-Modal-logout">
                    <span class="icone"><ion-icon name="log-out-outline"></ion-icon></span>
                    <span class="titulo">Logout</span>
                </a>
            </li>
        </ul>
    </div>

    <!-- Modal de Logout -->
    <div id="modal-logout" class="modal" style="display:none;">
      <div class="modal-content">
        <h2>Confirmar Logout</h2>
        <p>Tem certeza de que deseja sair?</p>
        <div class="logout-buttons">
          <button class="btnCancel" id="btn-cancel-logout" type="button">Cancelar</button>
          <button class="btnLogout" id="btn-confirm-logout" type="button">Sair</button>
        </div>
      </div>
    </div>

    <main class="sessoesContainer">

        <!-- HEADER -->
        <header class="sessoesHeader">

            <div>
                <h1 class="tituloSessoes">Histórico de Sessões</h1>
                <span class="dataSessoes">Consultas passadas</span>
            </div>

            <div class="acoesSessoes">
                <button class="btnVoltar" id="bt" onclick="window.location.href='agendaScreen.html'">Voltar para Agenda</button>
            </div>

        </header>

        <!-- FILTROS -->
        <section class="filtrosSessoes">

            <input
                type="text"
                placeholder="Pesquisar paciente..."
                class="inputBusca"
                id="buscarPaciente"
            >

            <input
                type="date"
                class="inputData"
                id="filtrarData"
            >

            <div class="filtros-status">
                <button class="btnFiltro filtro-ativo" data-filtro="todas">Todas</button>
                <button class="btnFiltro" data-filtro="realizada">Realizadas</button>
                <button class="btnFiltro" data-filtro="cancelada">Canceladas</button>
                <button class="btnFiltro" data-filtro="reagendada">Reagendadas</button>
            </div>

        </section>

        <section class="listaSessoes" id="listaSessoes">
            <div class="semSessoes">Carregando...</div>
        </section>
 
    </main>

</body>
