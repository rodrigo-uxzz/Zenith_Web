<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenith · Chat</title>
    <link rel="icon" type="image/png" sizes="64x64" href="../img/logoZ.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/chat.css" />
    <!-- <script>
    const token = localStorage.getItem("token");

    if(!token){
      window.location.href = "loginScreen.html";
    }
  </script> -->
  </head>
  <body>
    <!-- ── Sidebar (padrão do projeto) ── -->
    <div class="sidebar">
      <ul>
        <li>
          <a href="./homeScreen.html">
            <span class="icone"
              ><img src="../img/logo.png" class="logo" alt="logo do site"
            /></span>
            <span class="titulo">ZENITH</span>
          </a>
        </li>
        <li>
          <a href="./homeScreen.html">
            <span class="icone"><ion-icon name="home-outline"></ion-icon></span>
            <span class="titulo">Home</span>
          </a>
        </li>
        <li>
          <a href="./agendaScreen.html">
            <span class="icone"
              ><ion-icon name="calendar-outline"></ion-icon
            ></span>
            <span class="titulo">Agenda</span>
          </a>
        </li>
        <li>
          <a href="./pacientes.html">
            <span class="icone"
              ><ion-icon name="people-outline"></ion-icon
            ></span>
            <span class="titulo">Pacientes</span>
          </a>
        </li>
        <li>
          <a href="./financeiro.html">
            <span class="icone"
              ><ion-icon name="wallet-outline"></ion-icon
            ></span>
            <span class="titulo">Financeiro</span>
          </a>
        </li>
        <li>
          <a href="#" class="active">
            <span class="icone"
              ><ion-icon name="chatbubbles-outline"></ion-icon
            ></span>
            <span class="titulo">Chat</span>
          </a>
        </li>
        <li>
          <a href="./perfilScreen.html">
            <span class="icone"
              ><ion-icon name="person-outline"></ion-icon
            ></span>
            <span class="titulo">Perfil</span>
          </a>
        </li>
        <li>
          <a href="#" id="open-Modal-logout">
            <span class="icone"
              ><ion-icon name="log-out-outline"></ion-icon
            ></span>
            <span class="titulo">Logout</span>
          </a>
        </li>
      </ul>
    </div>

    <!-- Modal de Logout -->
    <div id="modal-logout" class="modal" style="display: none">
      <div class="modal-content">
        <h2>Confirmar Logout</h2>
        <p>Tem certeza de que deseja sair?</p>
        <div class="logout-buttons">
          <button class="btnCancel" id="btn-cancel-logout" type="button">
            Cancelar
          </button>
          <button class="btnLogout" id="btn-confirm-logout" type="button">
            Sair
          </button>
        </div>
      </div>
    </div>

    <!-- ── Main ── -->
    <main class="main">
      <!-- Chat area -->
      <div class="chat-body">
        <!-- Conversation list -->
        <!-- Conversation list -->
        <div class="conv-list">
          <div class="container-bila">
            <div class="search-wrap">
              <input type="text" id="input-pesquisa" placeholder="Pesquisar" />
            </div>
            <button class="btn-new">
              <p>+</p>
            </button>
          </div>
          <ul id="conv-list">
            <!-- preenchido pelo JS -->
          </ul>
        </div>

        <!-- Message window -->
        <div class="msg-window">
          <div class="msg-header">
            <div class="avatar" id="header-avatar">--</div>
            <div class="msg-header-info">
              <div class="name" id="header-nome">Selecione um paciente</div>
              <div class="status" id="header-status">--</div>
            </div>
          </div>

          <div class="messages" id="messages">
            <!-- preenchido pelo JS -->
          </div>

          <div class="input-bar">
            <button class="attach">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
                />
              </svg>
            </button>
            <input
              type="text"
              id="input-mensagem"
              placeholder="Digite uma mensagem"
            />
            <button class="btn-send" id="btn-send">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
              </svg>
            </button>
          </div>
        </div>
      </div>
      <!-- /chat-body -->
    </main>

    <script type="module" src="../js/chat.js"></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
