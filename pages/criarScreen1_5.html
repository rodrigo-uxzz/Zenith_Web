<!DOCTYPE html>
<html lang="en">
<head>

<body>

    <main> <!-- main: 1 -->
       
        <section> <!-- section: 2 -->

            <article>
                <figure>
                    <img src="../img/logo.png" alt="Logo Zenith">
                </figure>
                <p>Cadastro de Psicólogo</p>

                <!-- foto de perfil container -->
                <div class="profile-upload">

                  <div class="upload-container" id="uploadContainer">
                    <img id="preview" src="" alt="" hidden />
                    <div class="placeholder" id="placeholder">
                      <span class="icone"><ion-icon name="person-outline"></ion-icon></span>
                    </div>
                  </div>
              
                  <button type="button" class="upload-btn" onclick="document.getElementById('fileInput').click()">
                    <ion-icon name="camera-outline"></ion-icon>Adicionar Foto 
                  </button>
              
                  <input type="file" id="fileInput" accept="image/png, image/jpeg, image/gif" hidden />
              
                  <p class="info">
                    Formatos: JPG, PNG, GIF <br />
                    Tamanho máximo: 5MB
                  </p>
                </div>
                <!-- fim foto de perfil container -->
                 
            </article>

                   <!-- ----separador---- -->
                    
                    <div class="botoes-footer">
                       <button type="button" class="botaoC botao-anterior" id="botaoVoltar">⬅ Anterior</button>
                       <button type="button" class="botaoC" id="proximaTela">Próximo   ➡</button>
                    </div>

                    <div class="façaContainer">
                        <p>Já possui conta? </p><a href="./loginScreen.html" class="faça-login">Faça login</a>
                    </div>
                </form>
                
            </section>

        <script type="module" src="../js/cadastrar1.js"></script>
