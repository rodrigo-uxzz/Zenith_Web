                </figure>
                <p>Utilize seu e-mail ou CRP e sua senha cadastrada para entrar </p>

        <!-- botões e etc abaixo em section-->
            <form id="loginForm" action="#" method="post">
                <div class="input-container">
                <label for="email">E-mail ou CRP:</label>
                    <input type="text" id="email" name="email" placeholder="Seu@gmail.com" required>
                </div>

                <div class="input-container">
                <label for="password">Senha:</label>
                    <input type="password" id="password" name="password" placeholder="******" required>
                </div>
                
                <button type="submit" class="botaoE">Entrar</button>
                <a href="./criarScreen.html" class="botaoC" type="submit">Criar conta</a>
                <a href="#" class="esqueci">Esqueci minha senha</a>
            </form>

        </section>

    </main>
        <p class="mds">&copy; 2026 Zenith. Todos os direitos reservados.</p>
    
        <!-- Modal -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <p id="modal-message"></p>
            </div>
        </div>
    
    <script>
        // Função para mostrar modal
        function showModal(message) {
            document.getElementById('modal-message').textContent = message;
            document.getElementById('modal').style.display = 'block';
        }

        // Fechar modal
        document.querySelector('.close').onclick = function() {
            document.getElementById('modal').style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('modal')) {
                document.getElementById('modal').style.display = 'none';
            }
        }
